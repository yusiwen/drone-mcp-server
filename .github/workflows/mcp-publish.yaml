name: Publish MCP Registry

on:
  workflow_run:
    workflows: ["Docker"]
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release version
        id: get-version
        shell: bash
        run: |
          # 从触发 commit 获取 tag
          SHA="${{ github.event.workflow_run.head_sha }}"
          TAG=$(git describe --tags --exact-match $SHA 2>/dev/null || echo "")
          
          if [[ -z "$TAG" ]]; then
            echo "Error: No tag found for commit $SHA"
            exit 1
          fi
          
          # 去除 'v' 前缀（如果存在）
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Set release version in server.json
        shell: bash
        run: |
          VERSION="${{ steps.get-version.outputs.VERSION }}"
          jq --arg v "$VERSION" '.version = $v' server.json > server.json.tmp
          jq '.version as $v | .packages[0].identifier |= (split(":")[0] + ":" + $v)' server.json.tmp > server.json
          jq -e . server.json > /dev/null

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server metadata
        run: ./mcp-publisher publish
