name: Release Build

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.0, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: |
          make test

      - name: Build binaries with Makefile
        run: |
          # Get version from tag
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Build release archives using Makefile
          make release VERSION="$VERSION"
          
          # List generated files
          ls -la releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ env.VERSION }}
          body: |
            # Drone MCP Server ${{ env.VERSION }}
            
            ## Features
            - MCP server for Drone CI/CD
            - Supports stdio and SSE transport modes
            - 47 tools for managing repositories, builds, cron jobs, secrets, users, and templates
            
            ## Download
            ### Pre-built Binaries
            Available for:
            - Linux (x64, arm64)
            - macOS (x64, arm64)  
            - Windows (x64)
            
            ### Docker Image
            Multi-architecture Docker image available on GitHub Container Registry:
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ env.VERSION }}
            ```
            
            Supported platforms: `linux/amd64`, `linux/arm64`
            
            ## Quick Start
            ### Binary
            ```bash
            # Set environment variables
            export DRONE_SERVER=https://drone.example.com
            export DRONE_TOKEN=your_token
            
            # Run in stdio mode (for MCP clients)
            ./drone-mcp-server
            
            # Run in SSE mode
            ./drone-mcp-server --sse --host localhost --port 8080
            ```
            
            ### Docker
            ```bash
            # Run with Docker
            docker run -e DRONE_SERVER=https://drone.example.com \
                       -e DRONE_TOKEN=your_token \
                       -p 8080:8080 \
                       ghcr.io/${{ github.repository }}:${{ env.VERSION }} \
                       --sse --host 0.0.0.0
            ```
            
            ## Documentation
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed usage instructions.
            
            ## Changelog
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref }})
          files: |
            releases/*.tar.gz
            releases/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}