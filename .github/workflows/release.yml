name: Release Build

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.0, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: |
          make test

      - name: Build binaries with Makefile
        run: |
          # Get version from tag
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Build release archives using Makefile
          make release VERSION="$VERSION"
          
          # List generated files
          ls -la releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ env.VERSION }}
          body: |
            # Drone MCP Server ${{ env.VERSION }}
            
            ## Features
            - MCP server for Drone CI/CD
            - Supports stdio and SSE transport modes
            - 47 tools for managing repositories, builds, cron jobs, secrets, users, and templates
            
            ## Download
            Pre-built binaries available for:
            - Linux (x64, arm64)
            - macOS (x64, arm64)  
            - Windows (x64)
            
            ## Usage
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed usage instructions.
            
            ## Changelog
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref }})
          files: |
            releases/*.tar.gz
            releases/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}